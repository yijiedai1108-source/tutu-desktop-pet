<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>吉伊卡哇桌寵 · 姿勢一覽表</title>
<style>
  :root {
    --ink: #18181B;
    --muted: #475569;
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --tile: #F1EDE6;
    --border: #E4E4E7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Inter", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    padding: 48px 32px 64px;
  }
  header { max-width: 1080px; margin: 0 auto 12px; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.01em; }
  .sub { font-size: 16px; color: var(--muted); margin-top: 6px; max-width: 40em; }
  .grid {
    max-width: 1080px;
    margin: 28px auto 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 12px 14px;
    box-shadow: 0 1px 2px rgba(24,24,27,.04);
  }
  .stage {
    background: var(--tile);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
  }
  .stage svg { width: 86%; height: 86%; }
  .name { font-size: 15px; font-weight: 600; margin-top: 10px; }
  .name .num { color: var(--muted); font-weight: 500; font-variant-numeric: tabular-nums; margin-right: 6px; }
  .desc { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
</style>
</head>
<body>
<header>
  <h1>吉伊卡哇桌寵 · 姿勢一覽表 v2</h1>
  <p class="sub">v2 重畫比例：圓球身形、大眼低位、大腮紅、小耳短肢。灰條／速度線只是示意，不會出現在成品裡。</p>
</header>
<div class="grid" id="grid"></div>

<script>
const OUT = '#59504A';      // 描邊
const SKIN = '#FFFFFF';     // 身體
const BLUSH = '#F5A8B8';    // 腮紅
const MOUTH = '#D96A79';    // 口腔
const TEAR = '#8FC8EF';     // 眼淚
const PROP = '#CFC9BE';     // 示意用牆/天花板

// 四肢：外描邊＋白填色的膠囊（短肢）
function limb(x1, y1, x2, y2, w = 8) {
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${OUT}" stroke-width="${w + 4.5}" stroke-linecap="round"/>` +
         `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${SKIN}" stroke-width="${w}" stroke-linecap="round"/>`;
}

// 耳朵：小圓耳，貼著頭頂弧線（畫在身體後面）
function ears() {
  return `
    <ellipse cx="45" cy="30" rx="7" ry="9" transform="rotate(-14 45 30)" fill="${SKIN}" stroke="${OUT}" stroke-width="2.4"/>
    <ellipse cx="83" cy="30" rx="7" ry="9" transform="rotate(14 83 30)" fill="${SKIN}" stroke="${OUT}" stroke-width="2.4"/>`;
}

// 身體：接近正圓的球形，臉即全身
function body() {
  return `<path d="M64,32 C48,32 34,42 31,58 C29,68 30,82 36,92 C43,101 53,105 64,105 C75,105 85,101 92,92 C98,82 99,68 97,58 C94,42 80,32 64,32 Z"
    fill="${SKIN}" stroke="${OUT}" stroke-width="2.4"/>`;
}

// 表情：大眼、低位、寬間距；大腮紅緊貼眼下外側
function face(kind) {
  const blush = `<ellipse cx="40" cy="76" rx="7.5" ry="5" fill="${BLUSH}"/><ellipse cx="88" cy="76" rx="7.5" ry="5" fill="${BLUSH}"/>`;
  const dotEyes = `<circle cx="48" cy="66" r="4.4" fill="${OUT}"/><circle cx="80" cy="66" r="4.4" fill="${OUT}"/>`;
  const openMouth = `<path d="M60,74 Q64,80 68,74 Z" fill="${MOUTH}" stroke="${OUT}" stroke-width="1.8" stroke-linejoin="round"/>`;
  switch (kind) {
    case 'normal':
      return blush + dotEyes + openMouth;
    case 'happy': // 瞇眼笑（捧臉用）
      return blush +
        `<path d="M43,66 Q48,61 53,66" fill="none" stroke="${OUT}" stroke-width="2.8" stroke-linecap="round"/>` +
        `<path d="M75,66 Q80,61 85,66" fill="none" stroke="${OUT}" stroke-width="2.8" stroke-linecap="round"/>` + openMouth;
    case 'surprised': // 嚇（被抓）
      return blush +
        `<circle cx="48" cy="65" r="5.5" fill="#FFF" stroke="${OUT}" stroke-width="2.2"/><circle cx="80" cy="65" r="5.5" fill="#FFF" stroke="${OUT}" stroke-width="2.2"/>` +
        `<circle cx="48" cy="65" r="2" fill="${OUT}"/><circle cx="80" cy="65" r="2" fill="${OUT}"/>` +
        `<ellipse cx="64" cy="78" rx="4.5" ry="5.5" fill="${MOUTH}" stroke="${OUT}" stroke-width="1.8"/>`;
    case 'cry': // 淚眼（掉落）
      return blush + dotEyes +
        `<path d="M56,76 Q60,82 64,76 Q68,82 72,76" fill="none" stroke="${OUT}" stroke-width="2.2" stroke-linecap="round"/>` +
        `<path d="M41,70 q-2,5 0,8 q3,3 5,-1 q1,-4 -5,-7 Z" fill="${TEAR}"/>` +
        `<path d="M87,70 q2,5 0,8 q-3,3 -5,-1 q-1,-4 5,-7 Z" fill="${TEAR}"/>`;
    case 'squish': // >< （彈地、趴平）
      return blush +
        `<path d="M43,62 l9,4 l-9,4" fill="none" stroke="${OUT}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>` +
        `<path d="M85,62 l-9,4 l9,4" fill="none" stroke="${OUT}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>` +
        `<path d="M58,76 Q64,80 70,76" fill="none" stroke="${OUT}" stroke-width="2.2" stroke-linecap="round"/>`;
    case 'sleep':
      return blush +
        `<path d="M43,66 Q48,70 53,66" fill="none" stroke="${OUT}" stroke-width="2.8" stroke-linecap="round"/>` +
        `<path d="M75,66 Q80,70 85,66" fill="none" stroke="${OUT}" stroke-width="2.8" stroke-linecap="round"/>` +
        `<path d="M60,76 Q64,78.5 68,76" fill="none" stroke="${OUT}" stroke-width="2.2" stroke-linecap="round"/>`;
  }
}

// 組角色：legs 畫在身體後、arms 畫在身體前
function chara({ faceKind = 'normal', arms = '', legs = '', transform = '', extra = '' } = {}) {
  return `<g transform="${transform}">${ears()}${legs}${body()}${arms}${face(faceKind)}${extra}</g>`;
}

const stdLegs = limb(52, 101, 52, 111) + limb(76, 101, 76, 111);
const stdArms = limb(36, 84, 31, 94) + limb(92, 84, 97, 94);

const poses = [
  { name: '站立', desc: '預設待機，微垂手', svg:
    chara({ arms: stdArms, legs: stdLegs }) },

  { name: '走路 A', desc: '左腳前、右手前擺', svg:
    chara({ arms: limb(36, 84, 28, 90) + limb(92, 84, 99, 96), legs: limb(50, 101, 44, 111) + limb(78, 101, 82, 111) }) },

  { name: '走路 B', desc: '換腳，與 A 交替', svg:
    chara({ arms: limb(36, 84, 29, 96) + limb(92, 84, 100, 88), legs: limb(52, 101, 58, 111) + limb(76, 101, 70, 111) }) },

  { name: '坐下', desc: '腿朝前，手放身側', svg:
    chara({ transform: 'translate(0 8)', arms: limb(36, 86, 33, 96) + limb(92, 86, 95, 96), legs: limb(50, 101, 42, 108) + limb(78, 101, 86, 108) }) },

  { name: '坐下・捧臉', desc: '發呆差分，瞇眼', svg:
    chara({ transform: 'translate(0 8)', faceKind: 'happy', arms: limb(38, 90, 33, 72) + limb(90, 90, 95, 72), legs: limb(50, 101, 42, 108) + limb(78, 101, 86, 108) }) },

  { name: '趴平', desc: '整隻拍在地上', svg:
    chara({ transform: 'translate(0 34) scale(1.1 0.66)', faceKind: 'squish', arms: limb(33, 80, 18, 86) + limb(95, 80, 110, 86), legs: limb(52, 101, 46, 110) + limb(76, 101, 82, 110) }) },

  { name: '爬牆 A', desc: '雙手攀牆（灰條＝牆）', svg:
    `<rect x="8" y="0" width="10" height="128" fill="${PROP}"/>` +
    chara({ transform: 'translate(-12 0) rotate(-10 64 64)', arms: limb(40, 78, 31, 54) + limb(42, 92, 32, 96), legs: limb(52, 101, 44, 112) + limb(74, 101, 70, 113) }) },

  { name: '爬牆 B', desc: '換手，與 A 交替', svg:
    `<rect x="8" y="0" width="10" height="128" fill="${PROP}"/>` +
    chara({ transform: 'translate(-12 0) rotate(-10 64 64)', arms: limb(40, 78, 31, 92) + limb(42, 66, 32, 44), legs: limb(52, 101, 46, 113) + limb(74, 101, 68, 112) }) },

  { name: '爬天花板 A', desc: '倒吊爬行（灰條＝天花板）', svg:
    `<rect x="0" y="6" width="128" height="10" fill="${PROP}"/>` +
    chara({ transform: 'translate(0 -32) rotate(180 64 64)', arms: limb(36, 84, 28, 96) + limb(92, 84, 100, 96), legs: limb(50, 101, 42, 111) + limb(78, 101, 86, 111) }) },

  { name: '爬天花板 B', desc: '換手前進', svg:
    `<rect x="0" y="6" width="128" height="10" fill="${PROP}"/>` +
    chara({ transform: 'translate(0 -32) rotate(180 64 64)', arms: limb(36, 84, 26, 90) + limb(92, 84, 102, 100), legs: limb(50, 101, 44, 113) + limb(78, 101, 84, 109) }) },

  { name: '被抓住', desc: '拖曳中，手腳亂揮＋嚇', svg:
    chara({ faceKind: 'surprised', transform: 'translate(0 -2)', arms: limb(36, 80, 22, 68) + limb(92, 80, 106, 68), legs: limb(50, 101, 40, 113) + limb(78, 101, 88, 113),
      extra: `<path d="M20,44 q-6,8 0,16" fill="none" stroke="${PROP}" stroke-width="3" stroke-linecap="round"/><path d="M108,44 q6,8 0,16" fill="none" stroke="${PROP}" stroke-width="3" stroke-linecap="round"/>` }) },

  { name: '掉落', desc: '淚眼＋哇的嘴', svg:
    `<line x1="24" y1="6" x2="24" y2="20" stroke="${PROP}" stroke-width="3" stroke-linecap="round"/><line x1="64" y1="2" x2="64" y2="14" stroke="${PROP}" stroke-width="3" stroke-linecap="round"/><line x1="104" y1="6" x2="104" y2="20" stroke="${PROP}" stroke-width="3" stroke-linecap="round"/>` +
    chara({ faceKind: 'cry', transform: 'translate(0 6) rotate(-14 64 64)', arms: limb(36, 80, 24, 66) + limb(92, 80, 104, 66), legs: limb(50, 101, 42, 113) + limb(78, 101, 86, 113) }) },

  { name: '彈地', desc: '落地壓扁一瞬間', svg:
    `<line x1="12" y1="102" x2="2" y2="96" stroke="${PROP}" stroke-width="3" stroke-linecap="round"/><line x1="116" y1="102" x2="126" y2="96" stroke="${PROP}" stroke-width="3" stroke-linecap="round"/>` +
    chara({ faceKind: 'squish', transform: 'translate(0 30) scale(1.12 0.7)', arms: limb(34, 84, 24, 94) + limb(94, 84, 104, 94), legs: limb(52, 101, 46, 109) + limb(76, 101, 82, 109) }) },

  { name: '睡覺', desc: '側躺＋Zzz', svg:
    chara({ faceKind: 'sleep', transform: 'translate(6 26) rotate(78 64 64)', arms: limb(40, 88, 34, 98) + limb(88, 88, 92, 100), legs: limb(52, 101, 48, 111) + limb(76, 101, 80, 111) }) +
    `<text x="96" y="34" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="${OUT}">Z</text>` +
    `<text x="108" y="24" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="${OUT}">z</text>` },
];

document.getElementById('grid').innerHTML = poses.map((p, i) => `
  <div class="card">
    <div class="stage"><svg viewBox="0 0 128 128" role="img" aria-label="${p.name}">${p.svg}</svg></div>
    <div class="name"><span class="num">${String(i + 1).padStart(2, '0')}</span>${p.name}</div>
    <div class="desc">${p.desc}</div>
  </div>`).join('');
</script>
</body>
</html>
